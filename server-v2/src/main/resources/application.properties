server.port=8080
spring.jackson.serialization.write-dates-as-timestamps=false

# Tomcat thread pool — must exceed concurrent WebSocket connections + Consumer HTTP requests
# 128 WS sessions + 20 Consumer threads + internal overhead = ~300 needed
server.tomcat.threads.max=500
server.tomcat.threads.min-spare=50

# Server identity — override per instance: -Dapp.server-id=server-8082
app.server-id=server-8080

# SQS — queue names follow pattern chatflow-room-{01..20}.fifo
app.sqs.region=us-west-2
app.sqs.account-id=449126751631
app.sqs.queue-name-prefix=chatflow-room-
